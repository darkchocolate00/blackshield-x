<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >
    <title>Downloads</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>

<body data-view="downloads" class="downloadsView">

<main class="downloadsPage">
    <header class="downloadsHeader">
        <div>
            <div class="downloadsTitle">Downloads</div>
            <div class="downloadsSubtitle">Download history and saved files</div>
        </div>
    </header>

    <div id="downloadsEmpty" class="emptyState" hidden>
        No downloads yet.
    </div>

    <div id="downloadsList" class="downloadsList"></div>
</main>

<script src="../renderer/renderer.js" defer></script>
</body>
</html>
