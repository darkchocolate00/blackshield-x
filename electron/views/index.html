<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >
    <title>BlackShield X</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/tabs.css">
    <link rel="stylesheet" href="../styles/settings.css">
</head>

<body data-view="shell">

<div id="tabBar">
    <div id="tabsContainer" aria-label="Open tabs"></div>

    <button
            id="newTabBtn"
            type="button"
            title="New tab"
            aria-label="New tab"
    >
        +
    </button>
</div>

<div id="topbar">
    <div class="windowControls">
        <button
                id="winMinBtn"
                class="controlBtn"
                type="button"
                title="Minimize"
                aria-label="Minimize"
        >
            -
        </button>

        <button
                id="winMaxBtn"
                class="controlBtn"
                type="button"
                title="Maximize"
                aria-label="Maximize"
        >
            &#9633;
        </button>

        <button
                id="winCloseBtn"
                class="controlBtn closeBtn"
                type="button"
                title="Close"
                aria-label="Close"
        >
            &times;
        </button>
    </div>

    <div id="urlContainer">
        <input
                id="urlBar"
                autocomplete="off"
                spellcheck="false"
                placeholder="Search or enter URL"
        >

        <button id="goBtn" type="button">
            Go
        </button>
    </div>

    <div id="topActions">
        <button id="historyBtn" class="topBtn" type="button">
            History
        </button>

        <button id="bookmarksBtn" class="topBtn" type="button">
            Bookmarks
        </button>

        <button
                id="bookmarkCurrentBtn"
                class="topBtn iconBtn"
                type="button"
                title="Bookmark current page"
                aria-label="Bookmark current page"
        >
            &#9733;
        </button>

        <button id="settingsBtn" class="topBtn" type="button">
            Settings
        </button>
    </div>
</div>

<aside
        id="settingsPanel"
        class="sidePanel"
        aria-hidden="true"
>
    <div class="panelHeader">
        <div class="settingsHeader">Settings</div>
        <button id="settingsCloseBtn" class="panelCloseBtn" type="button" aria-label="Close settings">
            &times;
        </button>
    </div>

    <div class="settingBlock">
        <label for="searchEngine">Search Engine</label>
        <select id="searchEngine">
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="google">Google</option>
            <option value="brave">Brave Search</option>
            <option value="bing">Bing</option>
        </select>
    </div>

    <div class="settingBlock">
        <label for="performance">Performance Mode</label>
        <select id="performance">
            <option value="lite">Lite</option>
            <option value="balanced">Balanced</option>
            <option value="pro">Pro</option>
        </select>
    </div>

    <div class="settingBlock">
        <label class="checkboxRow" for="autoUpdate">
            <input type="checkbox" id="autoUpdate">
            Auto Update
        </label>
    </div>

    <div class="settingBlock">
        <label class="checkboxRow" for="saveHistory">
            <input type="checkbox" id="saveHistory">
            Save Browsing History
        </label>
    </div>

    <div class="settingBlock">
        <button id="clearCacheBtn" class="dangerBtn" type="button">
            Clear Cache
        </button>
    </div>

    <div class="settingBlock">
        <button id="clearCookiesBtn" class="dangerBtn" type="button">
            Clear Cookies
        </button>
    </div>

    <div class="settingBlock">
        <button id="checkUpdatesBtn" class="updateBtn" type="button">
            Check for Updates
        </button>
    </div>

    <div id="settingsStatus" class="statusText" aria-live="polite"></div>

    <div class="versionText">
        BlackShield X v1.0.0
    </div>
</aside>

<aside
        id="historyPanel"
        class="sidePanel dataPanel"
        aria-hidden="true"
>
    <div class="panelHeader">
        <div>
            <div class="settingsHeader">History</div>
            <div class="panelSubtitle">Recent browsing activity</div>
        </div>
        <button id="historyCloseBtn" class="panelCloseBtn" type="button" aria-label="Close history">
            &times;
        </button>
    </div>

    <div id="historyEmpty" class="emptyState" hidden>
        No history yet.
    </div>
    <div id="historyList" class="dataList"></div>
</aside>

<aside
        id="bookmarksPanel"
        class="sidePanel dataPanel"
        aria-hidden="true"
>
    <div class="panelHeader">
        <div>
            <div class="settingsHeader">Bookmarks</div>
            <div class="panelSubtitle">Saved pages</div>
        </div>
        <button id="bookmarksCloseBtn" class="panelCloseBtn" type="button" aria-label="Close bookmarks">
            &times;
        </button>
    </div>

    <div id="bookmarksEmpty" class="emptyState" hidden>
        No bookmarks yet.
    </div>
    <div id="bookmarksList" class="dataList"></div>
</aside>

<script src="../renderer/renderer.js" defer></script>
</body>
</html>
