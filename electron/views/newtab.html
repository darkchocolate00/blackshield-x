<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >
    <title>New Tab</title>
    <link rel="stylesheet" href="../styles/newtab.css">
</head>

<body data-view="newtab">

<div class="glow"></div>

<main class="container">
    <div class="logo">BLACKSHIELD X</div>
    <div class="subtitle">Secure Browsing - Persistent Sessions</div>

    <div class="searchWrap">
        <input
                id="searchInput"
                autocomplete="off"
                spellcheck="false"
                placeholder="Search or enter URL"
        >

        <button id="searchBtn" type="button">
            Search
        </button>
    </div>

    <div class="shortcuts" aria-label="Shortcuts">
        <button
                class="shortcut"
                type="button"
                data-shortcut-url="https://youtube.com"
        >
            <span class="shortcutIcon">YT</span>
            <span class="shortcutText">YouTube</span>
        </button>

        <button
                class="shortcut"
                type="button"
                data-shortcut-url="https://github.com"
        >
            <span class="shortcutIcon">GH</span>
            <span class="shortcutText">GitHub</span>
        </button>

        <button
                class="shortcut"
                type="button"
                data-shortcut-url="https://gmail.com"
        >
            <span class="shortcutIcon">GM</span>
            <span class="shortcutText">Gmail</span>
        </button>

        <button
                class="shortcut"
                type="button"
                data-shortcut-url="https://duckduckgo.com"
        >
            <span class="shortcutIcon">DDG</span>
            <span class="shortcutText">DuckDuckGo</span>
        </button>
    </div>
</main>

<div class="footer">BlackShield X Browser</div>

<script src="../renderer/renderer.js" defer></script>
</body>
</html>
